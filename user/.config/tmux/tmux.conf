unbind C-b
set -g prefix C-a

bind C-a send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"


set -g base-index 1
set -g pane-base-index 1

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256-color:Tc"

# ========  Layouts  =========
# -- Music --
bind M kill-pane -a \; \
       respawn-pane -k -c "#{pane_current_path}" "cmus" \; \
       split-window -h -p 35 "cava" \; \
       split-window -v "cd ~/Music; exec bash" \; \
       select-pane -t 1

# =======  Status Bar  =======
set -g status on
set -g status-interval 3
set -g status-style "bg=#1d2021,fg=#ebdbb2"

# -- Status Left --
set -g status-left-length 30
set -g status-left "#[fg=#282828,bg=#fe8019,bold] #S #[default] "

# -- Status Right --
set -g status-right-length 150
set -g status-right "#[fg=#83a598,bg=#3c3836] %H:%M #[fg=#8ec07c,bg=#504945] %d-%b "
